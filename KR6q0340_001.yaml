body:
  text: 住杭州靈隱禪寺法嗣淨伏編師初住建康府半山報寧禪寺入寺指山門云前不搆店後不迭村當陽坐斷上下平分更看直透雲霄之頂獨步乾坤佛殿悟道染泥沙佛祖生冤家新半山為甚燒香禮拜明珠絶纇皓玉無瑕踞室有主有賓無踈無親直饒七佛到來各與三十拄杖何也少喜多嗔拈府帖奪佛祖之機佐雨霖之手黃鐘大呂白雪陽春眼處聞聲有幾人升座拈香祝聖罷乃云一佛出世千佛讚揚十方坐斷獨露真常山蒼蒼雲蒼蒼半開半合隱顯全彰汝等諸人便恁麼領略得去新半山一周事畢其或未然鍾山橋畔日遲遲王謝堂前燕子飛復舉三聖道我逢人則出出則不為人興化道我逢人則不出出則便為人師拈拄杖云同一隻眼共一隻臂豎起臨濟正宗則不無二大老撿點將來總好與三十拄杖新半山義出豐年放過一著靠拄杖下座上堂拈拄杖示衆云拄杖子無向背東拄西撑登山涉海卞璧驪珠泥團土塊卓拄杖一下云一時粉碎又卓拄杖一下云話在佛涅槃上堂拈拄杖云有一事諸人不得不知釋迦老子卓拄杖一下云命根斷也說甚今日即有明日即無是處春山啼鷓鴣上堂上士聞道勤而行之朝打三千暮打八百中士聞道如存若亡蠱毒之家水莫嘗下士聞道大笑之甜瓜徹蒂甜苦瓠連根若半山恁麼提唱大有人橫點頭在必竟如何斫倒門前老松樹了得三年五載燒佛生日上堂釋迦老子初生便道天上天下唯吾獨尊那知更有老雲門雖坐一棒打不殺至今千古也成痕諸人且道是報恩耶五逆耶卓拄杖一下云總出者一杓惡水不得上堂絶名言超今古佛身無為不墮諸數恁麼恁麼則易不恁麼不恁麼則難既是佛身無為因甚有難有易不見道甜瓜徹蒂甜苦瓠連根苦上堂雨滌炎威秋雲自在一片兩片拄杖頭或卷或舒林木外白璧明珠泥團土塊放去收來顆顆圓填溝塞壑無人會阿呵呵六隻骰子滿盆紅有采無采大家別賽重九上堂說禪說道撒土撒沙半山終不也隨邪重陽定在九月九東籬何處無黃花恁麼則事因叮囑起且歸堂喫茶上堂抉驪龍頷意在得珠破蟠桃核要見其仁其仁既見珠作麼生卓拄杖一下云海神知貴不知價留與人間光照夜鎮江府金山龍游禪寺語録住杭州靈隱禪寺法嗣淨伏編師入寺指山門云龍門萬仞到者還稀不犯清波如何進步喝一喝佛殿立底是什麼坐底是什麼提起坐具云不出者箇踞室前佛性命後佛紀網開口即喪閉口即錯卓拄杖一下云瘥病不假驢駝藥拈府帖毫末非輕丘山非重按佛祖雲頭穿衲僧鼻孔剖破方知無罅縫法座諸法空為座早是起模𦘕樣了也新金山終不隨他轉喝一喝升座拈香祝聖罷乃云隔江招手萬象森羅笑點頭洗腳上船鐵壁銀山俱靠倒便見孤危不立逈絶躋攀截斷衆流寧容湊泊放開一線天平地平浪靜風恬魚龍起舞正恁麼時如何有星皆拱北無水不朝東復舉李翱尚書問藥山和尚如何是道山以手指天復指瓶云會麼李云不會山云雲在青天水在瓶李大悟乃投偈云鍊得身形似鶴形千株松下兩函經我來問道無餘說雲在青天水在瓶師拈云手擎仲尼日月腰佩毗盧正印則不無李尚書若是藥山意未會在元宵上堂一燈千燈千燈一燈未免只坐在光影裡以拂子打圓相云只如者箇在內耶在外耶良久云瞎癡絶和尚至上堂破沙盆沒巴鼻盡大地人扶持不起玉山路上荊棘參天鍾阜山前清風匝地擘破寶公面皮德雲無處回避何故理合如是上堂十五日已前只許老胡知不許老胡會十五日已後只許老胡會不許老胡知正當十五日會不會知不知風細細日遲遲卓拄杖一下云不惜黃金為彈子牡丹花下打黃鸝道舊至上堂大海揚塵高源出水狹路相逢知心有幾明明玉鑑光中浩浩煙波萬里鸑鷟擎頭金鱗擺尾江北江南絶望時一聲霹靂清飈起上堂推不去挽不來南天台北五臺大地寥寥兮何者當情春風浩浩兮雨打莓苔見成公案不涉安排豈在見桃花而後眼開上堂雲收海山橫月印江天曉擾擾紅塵中青春有多少鐵壁銀山一拶開落花流水空徘徊喝一喝是何言哉維楊回兼謝秉拂幹齊上堂棒喝交馳全提半提是真精進是名真法供養東山鐵餕餡擘破者方知坐看楊州跨鶴歸瓜洲古渡對斜暉上堂今朝五月五諸方盡鳴鼓不說藥病相治便說書符呪土金山伎倆既無未免別行一路卓拄杖一下云日輪當午知府判還下莊田上堂一見便見一得永得四邊界至故是分明一寸筆頭萬鈞之力三十年異苗翻茂千萬古中流偉績阿呵呵知不知青氈元是吾家物好看金牛作舞時立秋上堂火雲影裡一葉落玉鑑光中便見秋一任秋來又秋去大江依舊向東流無變易有來由塞鴻何處白鷺滄洲數聲漁笛煙村晚狼藉斷霞間釣舟喝一喝上堂雨洗炎威秋磨霄漢風傳䆉稏香鼓腹寒岩畔位轉功回木馬嘶劫外不須重借伴喝一喝巡堂喫茶解夏上堂布袋頭開天地大翠岩眉毛在不在一聲鴻鴈海門秋行人已在青山外上堂千說萬說不如親見有時怒濤袞底有時水清月現風颼颼冷啾啾雖然舊閣間田地一度贏來方始休上堂月冷天高風號怒濤提殺人劒用活人刀雲淡淡寒江鴈影山渺渺落日危巢見成題目眨上眉毛萬機頓罷歸來也是徒勞喝一喝上堂拈拄杖示衆云說到行不到行到說不到斫額望蓬萊弱水三萬里直饒行說俱到金山拄杖未到汝諸人喫在何故若無舉鼎拔山力千里烏騅不易騎冬至上堂群陰剝盡一陽來復鐵樹花開清香馥郁眼皮開未開枝南復枝北凹凹凸凸破沙盆何似鎮州大蘿蔔上堂清明寒食節韶光爛漫時野花迷古徑回首暮雲低紙錢飛處杜䳌啼不是苦心人不知喝一喝果州飯布上堂說得一丈不如行得一尺行得一尺不如離却一寸何也山高分水深青天分白日喝一喝諸山相訪上堂舉鹿門和尚一日有僧相訪僧問云如何是鹿門家風門云有鹽有醋僧云如何是道中人門云口似鼻孔僧云忽遇客來將何祗待門云柴門草戶謝子經過師拈云鹿門家風大展水泄不通既無受璧之心安有割城之意今日忽有人問金山如何是金山家風只向他道八面玲瓏如何是道中人直出直入忽遇客來將何祗待餅翻江上月鱠縷屋頭雲且道金山與麼答話與鹿門相去多少擊拂子一下云酒逢知己飲詩向會人吟謝秉拂幹齊上堂玉鑑光中波澄月現展屠龍手提金剛劒栗棘金圈一拶開從君細嚼渾崙咽有照有用有舒有卷楊岐消息未全灰優曇華笑春風面卓拄杖一下喝一喝歲旦上堂年年是好年日日是好日新年人看舊年人舊年日是新年日潮生漲舊痕潮落石頭出萬物有遷流遷流無變易有變易卓拄杖一下云上上大吉涅槃上堂釋迦老子弄精魂死了依前似不曾一樹落花春過後遠山無限碧層層上堂風來江上月到波心水月交光秋空一色大丈夫兒阿誰無一坐具地是汝諸人還得相應麼擊拂子一下云武林春已老臺榭緑陰多上堂圓同太虗無缺無餘良由取捨所以不如三祖大師大似與賊過梯不覺自傷己命金山莫有道處麼卓拄杖一下云驢鞍橋不是你阿爺下頷雪中示衆上堂一夜江風攪玉麈孤峰不白轉精神從空放下從空看徹骨寒來有幾人結制上堂南北東西幾路頭來來同載一扁舟月明夜靜滄浪裡一掣綿鱗隨直鈎雖然如是莫有不吞香餌底麼卓拄杖一下云生殺盡時消息盡不風流處也風流謝秉拂幹齊上堂智不到處不妨道著吸盡長江衝開碧落的的金圈栗棘一一天花乳酪楊岐消息儼然存大用機前活卓卓山僧合掌有分諸人如何啖玉鑑光中宇宙寬雙雙放出遼天鶻上堂山之高水之深非古亦非今老胡打失一隻履葱嶺那邊無處尋上堂風號寒霜凜冽屋浪崩騰飛銀撒雪截流過者未稱全提作死馬醫暖氣相接倒腹傾腸一線通月明不借蘆花白上堂長長出不得短短出不得四大海不寬藕絲竅不窄非耳目之所到非心意之所及自西自東自南自北落霞與孤鶩齊飛秋水共長天一色喝一喝巡堂喫茶潭州鹿苑褒忠禪寺語録住杭州靈隱禪寺法嗣淨伏編師入寺指山門云此是黃面瞿曇始初開法廣度群有大方便門新長老與誰同行同到驟步云把手拽不入佛殿佛身無為不墮諸數者一殿功德為什麼盡是色裝泥塑良久云無今不成古踞室烹佛煉祖鍛聖鎔凡殺活在手寶劒光寒意在星兮不在盤升座祝聖罷乃云古鏡無光當臺自照森羅絶影覿面難逃行不言之令坐致太平贊無為之化六國晏清天高地厚水緑山青山青青水泠泠湘西古渡夕陽明嶽足當簷開畫屏復舉寶壽開堂三聖推出一僧寶壽便打三聖云恁麼為人非但瞎却這僧眼瞎却鎮州一城人眼在壽歸方丈師拈云這棒合是寶壽三聖自喫何也盡道是臨濟二子義出豐年殊不知正是儉生不孝上堂李白桃紅桃紅李白或雨或晴或寒或熱一一是諸人放身捨命處因甚不肯承當忽有箇漢出來道長老豈無方便為人只向他道口是禍門上堂大盡三十日小盡二十九忽然春盡夏來不覺夜穿露肘貧無絲繫蟻內外空諸有拄杖聞得踊躍歡喜作是言曰曹山曾語稅闍梨清原白家三盞酒卓拄杖一下上堂擊鼓升堂說無義語有一句到汝諸人家國興盛無一句到汝諸人四海晏清拈露柱向燈籠上將露柱掛燈籠邊飢來喫飯困即打眠有甚麼事若也不會五月黃梅爛石臼上堂七佛已前然燈已後無人道著因甚鷲嶺拈花飲光微笑國清才子貴家富小兒嬌佛涅槃上堂十五日已前今日有十五日已後明日無正當十五日是有耶是無耶石頭大底大小底小野猿啼破千山曉上堂舉教中道遠離顛倒夢想究竟涅槃拋却甜桃樹㳂山摘醋梨者些消息子能有幾人知若也知滿山花發杜䳌啼撫州踈山白雲禪寺語録住杭州靈隱禪寺法嗣淨伏編師入寺指山門云白雲高灘水急不動腳頭全身直入佛殿前佛夜半逾城去後佛天宮未下來且道喚阿那箇作現在底佛插香云因我得禮你拈府疏花簇簇錦簇簇吟不足詠不足的的無絃琴上曲升座拈香祝聖罷乃云大機圓應大智無方右左逢原七穿八穴萬疊雲山一抹過十八灘頭聲浩浩遇貴即貴遇賤即賤法隨法行法幢隨處建立要津把斷縱奪臨時風細細日遲遲四海浪平龍睡穩九天雲淨鶴高飛復舉雪竇明覺大師一日與李殿撰坐次有一秀才一道士從外入來撰云三教中那教最尊雪竇起身側立撰云有口何不道雪竇云對夫子以難言師拈云大小大明覺大師被殿撰一問直得側身而立然雖如是要見雪竇則易要見殿撰則難也不難也不易必竟三教中那教最尊卓拄杖一下云棊逢敵手密行難藏琴遇知音希聲乃布當晚小參四十年前錯訪尋瓦爐煙斷白雲深如今再到經行處却憶無絃是賞音是以法無異法心不自心用不停機隨宜應變栴檀林裡噴伊蘭無角鐵牛眠石室不關萬象幽旨互融全主全賓十方通暢正與麼時如何委悉靠拄杖云三尺冷光摩朅令普天和氣少林春復舉三聖示衆云我逢人則出出則不為人興化道我逢人則不出出則便為人師拈云燕南趙北各據封疆可惜臨濟些子活計被二子一時花擘了也新踈山忍俊不禁出來為他作箇中人也是賊過後張弓卓拄杖一下上堂謝川人俊西堂春風卷春雨春樹生春烟作家相見不談禪天寒燒榾柮雲外煮清泉更有一般風味在從來附子出西川涅槃上堂十五日已前過山尋蟻跡十五日已後渡水覔魚蹤正當十五日作麼生道自徒一到拘尸後依舊金烏出海東重九示衆上堂西風蕭蕭急未急塞鴈聲聲寒未寒欲對黃花問時節有誰同倚玉欄干拍膝下座退院上堂階前黃葉兩三片門外白雲千萬重寄語善財休斫額德雲不在妙高峰平江府承天能仁禪寺語録住杭州靈隱禪寺法嗣淨伏編師入寺指山門云此門廣大未嘗不與諸人同出同入只是總踏不著因甚如此一步是一步佛殿麻三斤乾屎橛不是五逆漢此話憑誰說喝一喝踞室開口即錯閉口即啞釘觜鐵舌一時列下何故碧玉盤無縫罅拈府帖筆頭有眼主中主號令無私公至公妙用當機全殺活一新佛祖舊家風法座先聖道若欲高升此座先須作禮須彌燈王如來住住莫來攔我毬門路祝聖罷復拈香云此香枝葉全無一味真實覷著則兩目全枯嗅著則打失鼻孔不從外域而來只是江西道地奉為前住常州褒忠顯報華藏禪寺先師無得和尚爇向爐中用酬法乳之恩趺座乃云自雲青嶂春風秋月徘徊趙璧燕金閙市紅塵喝采攔街截巷痛劄深錐倒拽橫拖七穿八穴一任南來北來說甚船到陸到雙峩起舞萬佛點頭左右逢原隨宜應變必竟承誰恩力青山不鎖長飛勢滄海合知來處高復舉寶壽開堂三聖推出一僧壽便打三聖云恁麼為人瞎却鎮州一城人眼在師拈云寶壽據碧油幢百發百中三聖向大蟲口裡分餐美則美矣殊不知向者僧面前盡納敗闕雖然不入驚人浪難逢稱意魚退院上堂來何遲去何速十七日緣今已足拄杖橫擔歸去來一笑出門山水緑臨安府中天竺天寧萬壽永祚禪寺語録住杭州靈隱禪寺法嗣淨伏編師入寺指山門云樓閣門開了無回互既是家裡人便請直入佛殿過現未來總在者裡提起坐具云拜即是不拜即是義出豐年踞室面皮上刮得霜枯骨裡敲出髓轉得身吐得氣不是不是拈省劄回天關轉地軸普會人天一時諦聽升座祝聖罷乃云鷲嶺峰高萬象森羅齊斫額少林花發普天和氣絶遮攔高低圓應今古混融蕩蕩堯風熙熙舜日東㵎水流西㵎水南山雲起北山雲佛祖之玄關巨闢衲僧之正眼豁開至化無私十方通暢便恁麼去未當宗乘何故慣從五鳳樓前過手握金鞭賀太平復舉太宗皇帝幸大相國寺開寶塔次皇帝問卿是何人僧云塔主帝云既是寡人塔因甚卿作主僧無對師頌云寶塔層層面面開當機一拶語如雷信知恩大難酬處一段風光遍九垓捧勑黃望闕謝恩天書頒自九重來萬壑煙雲盡豁開竺土大仙燈燦爛融融和氣靄樓臺捧起云萬歲萬萬歲中秋上堂吾心似秋月碧潭光皎潔有月則似月無月又似箇什麼可笑寒山子是亦不是非亦還非還我清光未發時上堂舉梁山和尚示衆云南來者三十棒北來者三十棒雖然未當宗乘琅瑘和尚道梁山好一片真金却作頑銅賣了琅瑘即不然南來者三十棒北來者三十棒一任諸方撿責師拈云二大老一人八字打開一人水泄不通中竺門下一任南來北來要且無棒到你喫在何故真金自有真金價終不和砂賣與人上堂上士聞道勤而行之中士聞道如存若亡下士開道大笑之若是衲僧門下却許他大笑底有些骨氣白雲和尚與麼說話大似扶強不扶弱雖然如是賣劒賣與烈士中竺亦有箇道處上士聞道勤而行之斷腸愁聽峽猿啼中士聞道如存若亡一聲鴻鴈過斜陽下士聞道大笑之落葉辭柯滿竹扉道道何處尋今即古古即今曹溪波浪如相似無限平人被陸沈冬至上堂舉僧問一老宿云一陽後日長一線未審佛法長多少云一線長其僧有省今日中竺應時納祐下箇注腳長一線一線長眼聞耳見不用商量流水斷橋梅破蕚枝南枝北一般春雪中就謝諸庫上堂白玉樓臺爛銀世界一時撒在諸人面前平等受用直得普賢老人隱身無路却向中竺拄杖頭上開張鋪席東頭賣貴西頭賣賤豎百橫千甚生意氣拄杖子道住住諸人要見普賢老人麼卓拄杖一下鷺鷥立雪非同色明月蘆花不似他德巖佑長老瑞世明州天王上堂妙德巖中宴坐時釋梵天王同讚喜地搖六振雨花飛一聲霹𮦷清颷起滄海頭青海尾楊岐毒種靈苗殃害兒孫未已佛生日上堂手指天腳踏地目顧四方真少兒戲自言惟我獨尊天上人間誹誹中竺尋常不欲將惡水潑人今日獲不得已何故法王法如是謝秉拂化扇上堂正法眼破沙盆零敲碎打不直分文一一銀山鐵壁一一電掣雷奔是則固是鹽官道扇子既破還我犀牛兒來又作麼生卓拄杖一下云頭角已全露一見勝千聞重九上堂有一句甚瀟灑端的勝黃金只在東籬下見便見切忌躊躇是不是良由取捨且莫之乎者石霜虎巖伏長老法嗣書至上堂猿啼枯木虎嘯斷巖一燈發焰萬象同觀拄杖子未免手之舞之足之蹈之卓拄杖一下云何也世尊無密語迦葉不破顏佛生日上堂七步周行九龍灌沐赤條條地渾身誰道福足慧足韶陽打殺却堪誇斷弦自有鸞膠續佛成道上堂正覺山前明星皎皎夜半打失鼻孔將謂一了便了中竺看來有些短處不說也好開得眼來天大曉師母訃音至上堂當初已是錯投胎鬼面神頭相賺來裂破虗空無罅縫豎起拂子云龜毛拂子舞三臺辭衆赴靈隱上堂垂垂白髮老成魔異類中行罪過多業債既深償未足又拖犂杷出煙蘿臨安府靈隱景德禪寺語録住杭州靈隱禪寺法嗣淨伏編師入寺指山門云向上一關盡大地人入作無門新靈隱今日八字打開普請諸人從這裡入佛殿德山拆却雲門打殺正令全提沒對頭展坐具云漫天網子一時收踞室拈拄杖云明頭來明頭打暗頭來暗頭打總不與麼來時如何靠拄杖便起拈勑黃省劄衲僧命脉佛祖眼睛不消一劄且道向上事又作麼生良久云勑下曾聞六國清法座欲升此座先須作禮須彌燈王如來新靈隱則不然但有路可上更高人也行升座祝聖罷乃云鷲嶺拈花百萬人天瞻仰有分少林直指二三四七那覔蹤由洞明摩醯正眼發揚向上真機彌滿十虗纖塵不立正與麼時如何是開堂祝聖底句心似錢塘江上水無言日日向東流復舉太宗皇帝因僧朝見奏云陛下還記得臣僧否帝曰何處相見僧云靈山一別直至如今帝曰以何為驗僧無語師云臣僧普度快便難逢輒成一頌舉似大衆德合乾坤御九天祥光瑞氣靄山川當機覿面全提處一會靈山又儼然當晚小參豁開戶牗一時和氣少林春大坐當軒三尺冷光摩竭令法隨法行法幢隨處建立橫拋栗棘竪擲金圈今古混融聖凡路絶然雖如是卓拄杖一下云人歸大國方為貴水到滄溟始是波復舉法燈和尚云山僧本欲深藏巖竇養道過時奈緣先師有箇未了底公案出來為他了却時有僧問如何是先師不了底公案燈拈拄杖打云祖禰不了殃及兒孫僧云過在什麼處燈云過在你殃及我師云山僧亦欲深藏巖竇養道過時無奈松源師翁有則未了公案殃及先師展轉至于今日諸人要識松源師翁未了底公案麼夜深久立上堂邪人說正法正法悉皆邪正人說邪法邪法悉皆正卓拄杖一下邪耶正耶又卓拄杖一下說耶不說耶向這裡擇辨得出黃金為屋未為貴玉食錦衣何足榮上堂頭陀石被莓苔褁擲筆峰遭薜荔纏羅漢院裡一年度三箇行者歸宗寺裏參退喫茶好諸禪德真淨和尚是關西人尋常慣弄大旗鼓為什麼到這裡絲毫不敢動著卓拄杖一下須信來源萬仞高一條界破青山色上堂萬法是心光諸緣惟性曉本無迷悟人只要今日了既無迷悟人了箇什麼卓拄杖一下千言萬語無人會又逐流鶯過短墻上堂心王不妄動六國一時通罷拈三尺劒休弄一張弓與麼舉似也是與賊過梯諸人要見黃龍和尚麼拂石坐來衫袖冷踏花歸去馬蹄香上堂舉雲門和尚示衆云汝等諸人在此過夏山僧深不欲向你道惜取眉毛好師拈云雲門和尚靈龜曳尾拂跡跡生靈隱即不然汝等諸人在此過夏山僧直截句向你說口是禍門上堂舉黃龍草堂和尚示衆云上上根人一聞千悟得大總持家貧難辦素食中中根人須假言說方顯其道事忙不及草書下下根人執言定旨滯殼迷封俊不打籬邊黃龍和尚稱稱斗量毫髮無差靈隱即是和麩糶麵菽麥不分雖然如是不知那箇無思算喫著通身冷汗流謝何山長老并典座上堂滅正法眼佩毗盧印提鈯斧子拍拍是令白水田頭小溪深處一千五百人善知識杓頭上舀來頭正尾正鹽鹹醋淡活計現成斤兩自定諸人還知落處麼卓拄杖一下物見主眼卓竪謝監收上堂衲僧命脉卓拄杖一下總在這裡有放有收入泥入水把得定作得主萬斛明珠奏凱歸帶刀只麼噇眠去道場無等和尚遺書至上堂虎巖巖下虎咬人齒不露踞地坐耽耽南北無行路翻身一擲更無蹤虗空拍掌須彌舞萬象森羅一時痛苦石人木人淚如雨上堂舉臨濟和尚道有一人論劫在塗中不離家舍有一人離家舍不在途中那箇合受人天供養師拈云兔馬有角牛羊無角寸毫尺𨤲天地寥廓潘閬倒騎驢攧殺黃番趠上堂十五日已前銀山鐵壁十五日已後鐵壁銀山正當十五日一塵不立天地寬那知更有上頭關卓拄杖一下上堂祖師門下討甚巴鼻東行西行無是不是忽然籬下菊花黃此時決定是重陽關爐上堂火爐頭有一句道得完全未敢相許靈隱不是壓良為賤卓拄杖一下物若見主兩眼卓竪佛成道上堂夜半逾城明人不作暗事凍餓六年自作還他自受只如覩明星時悟箇什麼衆眼難瞞上堂諸佛行不到處進取一步諸佛說不到處道取一句直饒行說俱到正好喫拄杖何故覔火和煙得擔泉帶月歸上堂竪拂子云只這箇便是萬里望崖州離此別求臨崖看滸眼桃紅李白水緑山青不借亦不借法法本如是只如轉位回機時如何夜月不隨流水去片雲多向故山歸結夏上堂布袋頭一結百城消息絶蠟人氷不氷萬里一條鐵珊瑚枝枝撐著月上堂一期九十日鐵壁復鐵壁四方八面來只是跳不出落霞與孤鶩齊飛秋水共長天一色五月望出歸上堂短棹輕帆風恬浪靜溢目湖光鏡樣平漁歌未起同誰聽萬壑千巖高低普應狼藉斷霞殘照中船頭撥轉都收盡正與麼時如何卓拄杖一下云麼朅提國親行此令上堂從上以來的的相承咬定牙關不通水泄可中三三兩兩有席卷三秦之略嫌佛不做若到靈隱門下又且如何也免三十棒不得謝雪峰絶岸和尚上堂靈符在手大用全彰木毬輥處雷動風行鱉鼻拈來橫拋竪擲魔外望崖而退佛祖窺覷無門坐斷要津十方通暢正恁麼時且道如何是接手底句相見又無事不來還憶君上堂日可冷月可熱衆魔不能壞真說且道如何是真說成住壞空上堂舉賓國王敬重三寶一日仗劒問師子尊者曰師得薀空否尊者曰已得薀空王曰離生死否尊者曰已離生死王曰既離生死可施我頭尊者曰身非我有何吝於頭王遂斬之師云作家賓國王尊者首湧白乳數尺師云好手手中呈好手王之左臂隨即墮地師云得人一牛還人一馬諸人且道賓國王與師子尊者是酬恩報德耶是冤憎會苦耶若向這裡緇素得出十二時中功不浪施其或未然數聲羌笛離亭晚君向瀟湘我向秦上堂八月二十五洞山離查渡咄哉老雲門多却末後句桃花浪暖禹門高霹𮦷一聲燒尾去佛成道上堂老瞿曇眼孔小一星半星容不得說迷說悟何時了衲僧分上那有許多般雪晴海闊千峰曉上堂達磨西來只箇不識鐵壁銀山挨拶不入因甚分皮分髓飛來峰高冷泉碧百丈和尚送猿至上堂舉僧問百丈如何是奇特事丈云獨坐大雄峰師頌云巍巍獨坐大雄峰萬水千山列下風相見不談奇特事一聲猿呌翠微中端午上堂不釘桃符不懸艾虎駕鐵牛機擊塗毒鼓千妖百怪盡潛蹤靈鷲峰高日卓午雲峰和尚赴蔣山上堂肩拄杖云寶公和尚來也拄杖頭上寸長尺短剪拂分明便與麼下山教化衆生去入泥入水要津把斷虎踞龍蟠可中有箇不受商量剪拂不去底又且如何排遣卓拄杖一下云放開鐘阜山頭月斷送踏蘆人渡江上堂雪竇云直鈎釣鯤鯨曲鈎釣龜鱉曲鈎若在鯤鯨理應未可直鈎若在龜鱉情亦不甘辨龍蛇擒虎兕還他雪竇老人要釣鯤鯨龜鱉未敢相許靈隱鈎無曲直任是鯤鯨龜鱉一切不問何故釣竿斫盡重栽竹不計功程得便休本覺虗室滿長老至上堂大機圓應大用無方撲碎破沙盆滅却正法眼要津把定佛祖潛蹤正案傍提百發百中便恁麼去且道是誰家風月檇李亭前摩朅令滿天和氣少林春上堂八月九月不寒不熱盤山擲劒揮空正是箇般時節無古無今無間無歇癡雲卷盡雨聲收千里萬里一條鐵上堂舉白雲端和尚示衆云若端的得一回汗出向一莖草上現瓊樓玉殿若未得一回汗出縱有瓊樓玉殿被一莖草蓋却師拈云白雲和尚慈悲之故有落草之談靈隱門下不管你端的不端的縱有瓊樓玉殿亦無著處諸人且道是醍醐句是毒藥句幾度見君深問訊養雞意在五更初重九兼謝支提和尚上堂露滴滴風凄凄黃花香滿路何獨在東籬高低普應步步相隨有時朱涇江上玉線輕垂船頭撥轉天冠元在支提何故逢強即弱故舊至上堂落葉飄飄秋江清淺烈士相逢干戈不展何故言多去道轉遠開爐上堂普天寒色大地為爐但見清風壁立不知石爛松枯丹霞燒木佛因甚院主墮眉鬚卓拄杖一下若無這些火種討甚碧眼老胡焦山足翁和尚遺書至上堂海門一夜波濤惡玉麟攧折黃金角魚龍蝦蟹盡潛蹤大悲千手難摸索木馬悲嘶石人淚落諸人且道足翁和尚生耶死耶長汀拖布袋普化搖鈴鐸上堂休去歇去一念萬年去一條白練去古廟香爐去喝一喝若不得流水還應過別山徑山虗堂和尚遺書至上堂拔地凌霄峰嵳峩倚寥泬一夜天風忽吹折木馬悲嘶石人哽咽曉來雲散谷風清千古虗堂照明月無得和尚忌辰拈香云東湖輥底怒濤青山參天荊棘兩處狹路相逢拶得渠儂上壁恩難酬怨難酬熱煮冷泉流水濃點淡茶一甌留兩班上堂卓拄杖云有權有實有照有用些些鬼眼睛臨機要活弄弄得活沒踈親誰知席帽下都是舊時人謝首座秉拂都寺齊上堂聲前一句斗換星移石火莫及電光罔追栗棘蓬當面擲全剛劒信手揮卓拄杖一下少林消息斷花綻不萠枝慶元府萬壽庸叟中長老廣福梅巖默長老嶽林南坡嶽長老瑞世上堂一即三三即一達磨不曾離少室父子雖親妙不傳一花五葉成狼藉海風吹起怒濤寒截流過者腳不濕道在中庸梅香巖石破沙盆子響玲瓏要在當人善拋擲以拂子打一圓相又擊一下汝等諸人還知落處麼若也未知更待當來問彌勒端午上堂文殊雖令善財採藥佛病祖病未曾醫著靈隱病亦無藥亦無趙州東壁掛葫蘆佛生日上堂二千年前毗藍園裏地動山搖禍胎忽起雲門瞎棒打不死後代兒孫空切齒休切齒杓柄短長澆潑在你上堂說禪說道易成佛作祖難突出門前大案山成佛作祖易說禪說道難南海波斯念八還也不難也不易衲僧敲處遼天鼻卓拄杖一下這裏是什麼所在說難說易又卓拄杖一下官不容針私通車馬上堂教中道善現問舍利弗以何為佛眼舍利弗云以性空為佛眼善現云善哉善哉從上諸佛皆以性空為佛眼師拈云針鉸膠粘涓滴不漏諸人且道必竟以何為佛眼喝一喝平江萬壽囦叟和尚遺書至上堂昨夜毗嵐撼山嶽七十二峯俱倒卓太湖萬頃涓滴無黃葉亂飄星斗落要見囦叟和尚麼玉兔挨開八詠樓金烏破琉璃殼上堂舉僧問法眼秋風才動貧者何依眼云若能知恩方解報恩師云這僧抱贓呌屈法眼著賊不知雖然法眼慈悲之故有落草之談其奈知音者少靈隱與麼舉唱莫有知音者麼良久云黃葉飄飄滿庭際一聲砧杵落誰家婺州雙林松關至上堂開口不是禪閉口不是道只是箇輪槌拈來用恰好一擊天門開萬象俱靠倒狹路忽相逢拍掌呵呵笑且道笑箇甚麼相見又無事不來還憶君雪中謝諸莊庫并監收上堂入荒田出荒田信手拈來顆顆圓橫三千竪三千雖曰眼底空花直是明白洞然衲僧分上有放有收有開有合作麼生紅爐一點雪謝南臺高臺上封三剎長老上堂巖頭雪嶠與欽山共轍同途豈等間要識南臺真白額從來虎體一般斑便恁麼去靈山百萬大衆又何止金色頭陀破顏一時滅却正法眼把手獨行天地寬上堂舉古德因僧問如何是大修行底人德云擔枷帶鎖僧又問如何是大作業底人德云修禪習定師云古德言中有響句裏藏機如人善射箭不虗發且道還有出身路也無甜瓜徹蒂甜苦瓠連根苦石樓和尚赴平江萬壽上堂妙喜黑竹篦有背還有觸兒孫用得親通身是眼目正令全提轉轆轆花簇簇錦簇簇直教佛祖亦頭低宇宙空來更有誰佛涅槃上堂拘尸那城有生滅我此世界生滅無桃紅李白花時節是處江山開畫圖釋迦老子自是隱身無路為什麼道今夜入般涅槃蒼天蒼天何山覺菴和尚至上堂用鈯斧子非重非輕拈起放下肘後符靈直得連雲翼翼霅水𥻘𥻘布小溪漫天鐵網活捉金鱗必竟以何為據開口不在舌頭上上堂清明前寒食後花雨漫天雲滿岫誰家小犢力未完但知逐隊隨群走阿呵呵索頭只在翁翁手當機一掣掣斷時野犴便作師子吼雖然如是知恩者少上堂船來也到陸來也到船來陸來紅日杲杲白雲缺處燒痕青春在少林元不老且道向上還有事也無踏著不嗔上堂結夏已十日那事無消息雲在嶺頭間水流何太急法法不隱藏古今無朕迹豈不見盤山道譬如擲劒揮空莫論及之不及良久云一日鉢盂兩度濕上堂秧入土麥上場豐年已兆比屋盈倉飢來喫飯熱來乘凉東倒西擂隨緣遇方更無餘事可商量夜來却被子規啼斷腸因甚如此閻羅老子要飯錢請監收上堂舉五祖和尚云四五百碩麥二三千稱稻好箇休糧方耆婆不得妙師拈云奇哉五祖老兒無中唱出有處全收一時撒向諸人面前只是咬嚼不破何故飯籮邊坐有飢人上堂見身無實是佛見了心如幻是佛了了得身心本性空斯人與佛何殊別坐底坐立底立觸目遇緣更非他物必竟阿那箇是佛良久云野老不知堯舜力鼕鼕打鼓祭江神上堂拶著便動舉一明三目機銖兩也是隔海望蓬萊弱水三萬里衆中聞得恁麼道莫有耳卓朔地不甘底麼出來商量看其或未然新秋簾幕千家雨落日樓臺一笛風壽崇節上堂一佛出世祥光布地一念萬年壽山增翠曉來風起滿庭香吹綻蟠桃三五蘂上堂是法住法位世間相常住昨日大風潮吹折山前樹雲自向天飛水流朝海去此猶是世間相如何說箇常住底卓拄杖千虗不博一實退耕和尚入祖堂用文武火運惡鉗鎚死學者偷心開人天眼目大用機前轉轆轆十分慈悲十分惡毒六踞名藍兮一笑來歸青燈夜寒兮香風馥馥集慶寺侵占山前地段承省劄撥還上堂山前一片間田地曠大劫來無界至今朝復又歸來坐斷腳頭併腳尾東也是西也是南北東西無不是必竟作麼生酬恩報德直指堂前香一炷十里荷花九里松臨安府徑山興聖萬壽禪寺住杭州靈隱禪寺法嗣淨伏編師入寺拈劄云佛祖眼睛人天命脉總在這裏諸人若信得及不妨側耳拈山門疏屋裡有金外頭有稱鹽醎醋淡斤兩自定自然左右逢原管取拍拍是令拈江湖疏人相忘於道術魚相忘於江湖既曰相忘拈起疏云却要這箇作什麼法座古者道此座高廣吾不能升是何言歟腳力盡時山更好升座拈香祝聖罷次拈香云此一瓣香三十年八回拈出更看末後殷勤奉為前住常州褒忠顯報華藏禪寺先師無得和尚爇向爐中用酬法乳之恩趺座乃云豁開戶牖萬山排闥送青來大坐當軒百鳥不來春晝永高低普應聲色全真把斷牢關不通水泄堯風蕩蕩舜日熙熙不涉見聞百發百中畢竟承誰恩力青山不鎖長飛勢滄海合知來處高復舉寶壽開堂三聖推出一僧壽便打聖云恁麼為人瞎却鎮州一城人眼在師云寶壽鏌鎁在手正令當行者僧見義勇為抱賞歸家諸人要見三聖麼從來汗馬無人識只要重論蓋代功當晚小參八十翁翁輥繡毬誰知輥得意休休如今逗到凌霄上雲自高飛水自流昔年行處石頭大小依然今日重來樓閣高低何在德山棒如雨點臨濟喝似雷奔徑山門下總用不著何故臂健尚嫌弓力軟眼明猶識陳雲高復舉三聖道我逢人則出出則不為人興化道我逢人則不出出則便為人師頌云雙雙把手上高樓唱拍相從各應酬歌鼓散時人盡醉也無歡喜也無愁解制上堂今朝七月十五衲僧拄杖起舞頭頂西天腳踏東土游歷百城不移寸步阿呵呵白雲綻處青山露蔡講書熙書記至上堂舉道吾示衆云高不在絶頂富不在福嚴樂不在天堂苦不在地獄相識滿天下知心能幾人後來大慧道徑山則不然高在絶頂富在福嚴樂在天堂苦在地獄誰知席帽下元是昔時人師云二大老一人船行一人步到狹路相逢掀眉一笑何故酒逢知己飲詩向會人吟開爐上堂天無四壁大地為爐籬頭吹觱栗寒鴈一聲孤老胡若不渡江去至今火種一星無無得和尚忌辰上堂以拂指云塢那青青處山高雲半垂面面栽荊棘遊人到者稀寥寥五十載昨是今何非太湖三萬六千頃月在波心說向誰上堂江月照松風吹永夜清霄何所為永嘉大師上無片瓦遮頭下無卓錐之地向十字街頭揚聲大呌土曠人稀相逢者少山僧向他道且緩緩直饒百鍊精金也入紅爐再煆謝兩班上堂以拂子左邊擊一下云東邊也恁麼拂子右邊擊一下云西邊也恁麼提起折腳鐺大家扶則箇扶起與放下竪起拂子云總不離這箇阿呵呵鎮州蘿蔔從來大謝首座秉拂上堂震法雷擊法鼓玉角金鱗興雲吐霧機前拶倒凌霄峰大地撮來無寸土殺活全提平欺佛祖雖然且如何是人天眼目良久云行化歸上堂驕陽正酷火雲飛一雨雱霈徹四維䆉稏吹香民已樂山川草木亦光輝此猶是諸人受用現行三昧且道建化門中事又作麼生向道是龍剛不信果然奪得錦標歸解制上堂鐵網漫漫面面開百城幾度去還來二千年結知誰解又著三文買草鞋上堂佛法無人說雖慧不能了幸然平似鏡何用曲如釣又教中道無法可說是名說法千鈞之弩不為鼷鼠發機諸人且道說則是不說則是卓拄杖一下云不是不是上堂時臨秋九不寒不熱瓦礫鳴秋蛩茅簷掛殘月各自著便宜正是好時節只如祖師道葉落歸根來時無口又作麼生迦葉面皮黃達磨牙齒缺上堂一日三三日九只知暑往寒來不覺躘蹱老朽退一步絶離微百花開盡後黃菊在東籬歸堂喫茶無得和尚忌辰拈香云憶昔當年錯訪尋被他用盡毒肝心賺來賺到凌霄頂火冷雲寒恨轉深冤可解不可結必竟如今甚時節打拳何似喫拳時此理明明向誰說旋汲龍囦萬丈深爛煮春茶翻白雪元宵上堂徑山一碗上元燈不是攢花剪簇成等間拈起當陽掛爍破諸方鬼眼睛藏叟和尚入祖堂踏斷洛陽橋直上妙峰頂拈得家傳黑竹篦攪動龍淵千尺井四五處雷動風行八九十春花月影為人端的無情獨脫單提誰領竹篦雖折典刑存聞見猶能發深省且道藏叟和尚生耶死耶青燈夜寒篆煙晝永龍王歸殿拈香願力弘深威靈有異六百載梵剎重興千大界光明照世為霖為雨沃大地之焦枯為瑞為祥福生靈於遐邇陰功懋密聖恩罔既新寶殿以回鑾奉宸旒而正位聰明正直不容私只因錯受靈山記小參門人行佑德珍瓊林等編結夏聲前一句格外一機不墮古今寧存凡聖妙高臺上玉鑑光中日日安居時時禁足風恬浪靜海晏河清長期短期平等受用諸人還知麼闌干同倚不同倚消得龍王多少風結夏學道先須有悟由賊無種相鼓儱還如曾鬪快龍舟碧眼胡僧笑不休雖然舊閣間田地物見主眼卓豎一度贏來方始休緑楊影裏戴嵩牛如是安居如是禁足如投身於火悉皆成火似鎔像為金莫不若也節外生枝斫額望蓬萊弱水三萬里其或未然掣取六鰲隨手去莫教空到海山結夏機輪瞥轉智眼豁開縱無礙神通闡不窮妙用全超玉鑑獨步妙高無理不伸有言咸暢既隨處而發生必隨處而解脫衲卷百城煙水優游樂業安家不涉功勳全彰意氣若約衲僧門下猶較九十日程在且道衲僧家有甚長處良久云若不同床睡焉知被底穿結制大道無說說則成謗拈花微笑帶水拖泥面壁安心起模𦘕樣凡聖路絶覿體全真寥寥千古無依寂寂神光不昧中竺一路荊棘參天水月光中風雲有異還信得及麼把定牢關無箇事長嘯一聲煙霧深解制布袋頭開乾坤蕩豁十方坐斷六合風清孤逈逈寸草不生峭巍巍纖塵不立東西南北絶蹤由邁古超今活卓卓任爾德山臨濟窺覷無門說甚長期短期一筆勾下何故佛手遮不得人心似等間結制祖師門下道絶人荒萬仞崖頭相逢者少磊磊落落廓徹混融若作佛法商量未免墮坑落塹護生禁足貼肉汗衫著則易脫則難謹守蠟人粘牙綴齒吞則易吐則難思而知慮而解望梅林止渴有甚快活不見道斫倒門前老松樹了得三年五載燒萬機休罷千眼頓開正按傍提百發百中飄飄墜虗庭歷歷寒泉瀉清碧功勳不立聖解頓忘舒卷自由縱橫得妙自是不歸歸便得五湖煙景有誰爭冬節運推移日南長至巍巍飛來峰歷劫只如是不動亦不遷無變亦無異背巖石筍暗抽條雲外千峰鎖寒翠君子道小人道自消自長如來禪祖師禪卓錐無地東村王老夜燒錢野鬼間神爭意氣若是衲僧門下不消噴嚏一聲管取魂飛膽碎且道衲僧門下有甚長處良久云只因少室錯流芳五葉一華香撲鼻歲除平實道路敲磕門庭竪抹橫該高低普應頂𩕳上一向壁立腳跟下不露絲毫逢佛掩面聞法嗽口凡盡聖除風行草偃夜深方見把針人倚闌靜看千山雪一任春回歲盡從教換舊移新去年三百六十日也恁麼今年三百九十日也恁麼多亦無餘少亦不缺看看拶到交結頭不覺﨟月三十日前不至村後不迭店是為途路之客如何到得家去所以古人道道無心合人人無心合道會得箇中意一老一不老諸人要見一不老底麼只為分明極翻令所得遲冬至一劃未形混然無際形名既兆黑豆生芽晝短夜長寒來暑往從上已來若佛若祖盡向無中唱出節外生枝拈一花航一葦無風起浪鼓蕩四溟盡大地人無措身處靈隱今夜要與諸人於陰消未消之際陽長欲長之時露箇消息卓拄杖一下云千峰鎖寒色一樹暗香浮解制布袋頭開十方通暢信口道一句塞斷老胡咽喉信腳行一步踏斷瞿曇脊骨盡大地人無立作處四聖六凡結舌有分所以道九旬禁足畫地為牢三月安居敲空作響若是英靈上士氣宇驚群如金鱗透網游泳波瀾似俊鶻出籠翱翔霄漢是則是只如萬里無寸草處出門便是草又是什麼人行履處江北江南問王老一狐疑了一狐疑冬節拈來便用當陽撒出夜明珠大施門開直下何人共酬價門庭敲唱觸處皆真直截當機高低普應寒氷氷脫體無依峭巍巍纖塵不立窮則變變則通一畫既形地雷已震陰消陽長䥫樹花敷香風四馳天地寥廓通人分上合作麼生霜天月落夜將半誰共澄潭照影寒至節五峰峭峙萬壑雲寒覿體現成面目全露踏得這些田地從教陰極陽生瓦礫光輝萬象失色石頭大大小小修竹曲曲斜斜天為雲高水因月現靈明廓徹今古混融便恁麼去坐守寒灰終非上䇿若是英靈上士五逆丈夫掀翻從上門庭則立自家活計臘前消息梅英小更待春風著舊枝向上一路直截現前用不停機住無作相天地自天地日月自日月覆載晦明絲毫不易容合萬有象外齊昭從教陰極陽生一任寒來暑往所以老瞿曇於三七日中思惟如是事覔箇啓口處酌然了不可得理能伏豹卓拄杖一下云到這裏轉得身吐得氣開得眼行得到遼鶴三千鵬九萬盡大地撮來粟米粒大豈不暢快生平成就大丈夫事業其或未然梅花一去無消息惟有春風喚得回歲除今歲今宵盡明年明日來寒隨一夜去春逐五更回只如春不回寒不去諸人又作麼生凌霄峰下卓拄杖一下云這一片田地不屬陰陽寧拘造化日月不能照寒暑不能侵無變無遷無來無去上至非非想天下極空輪水際逈無邊表不隔絲毫三世諸佛絶行蹤南北東西總如舊無北禪之牛可烹無青原之酒可酌山前山後野狐兒聲聲盡唱村田樂樂則樂矣誰知年盡夜更有未歸人偈頌悼天童晦巖和尚恩怨重重分未分再來不見舊時人娟娟宿鷺亭前月忍照西風吹白蘋送文上人遊台蕩文彩全彰拄杖頭吳山楚水興悠悠江聲一夜催行色踏斷石橋方始休送森知客清遠溪邊劄寨時春風簇簇露槍旗誰知喚客喫茶處萬別千差一道歸送高郵友上人死生事大方行腳徹骨貧窮未到家一百十城回首處大淮南畔有高沙送雲上人楖𣗖杖頭懸日月草鞋跟底帶山川逢人問著吾家事靈鷲峰前是冷泉送鑒上人鑒在機先已是遲電光石火亦難追鷲峰點著便回去終不重安眼上眉送達州先上人吾道從來沒正偏就中達者便為先花前一笑即回首此去西川路八千付法衣與瓊林侍者楊岐擔子無輕重上得肩時便著行咬定牙關提正令卷舒殺活任縱橫示食三白通菴主舌端異味已全拋松竹煙雲作淡交有口不吞三世佛一天風月任蕭騷送僧瘦坐清行合㵎邊衲衣楚楚濕蒼煙春光盡逐杖黎去留得暮山啼斷猿送小師淳志遊方參禪不是小因緣立志當如䥫石堅百城靠倒無依倚回首歸來喫痛拳示倪居士一切塵中堅密身塵塵頓現本來人了知此外更無佛野鳥山花別是春示馬路鈴參禪乃是丈夫事良馬從來不用鞭六窗盡啓乾坤大萬里無雲一片天送僧歸天台龍門浪裏翻身出凜凜風生氣宇清歸到石橋君自看杖頭猶帶怒濤聲送楷維那輥底怒濤千丈雪轉空明月一天秋贈行莫道窖歷歷君家拄杖頭送淨頭道者糞掃堆頭拾得來花前不覺笑顏開靈山寫作送行句留與叢林作禍胎送小師淳真參雪竇千丈巖垂雲萬疊老龍高臥見還稀子今決志攀鱗角莫顧巖前雪浪飛送怡齊周居士兼簡湯東㵎我羡怡齊去又來㵎邊無一點塵埃高風凜凜照今古有口不談聲似雷送見上人歸劒州見處分明得處親直於劒刃上翻身連雲棧閣重回首已是昔人非昔人送僧之雪峰南山鱉鼻死多時何苦崎嶇要覔伊無底籃兒收拾得不妨挑取杖頭歸墨梅常憶西湖處士家踈枝冷蕊自橫斜精明一片當時事只缺清香不缺華大疑此心未決應須決決了而今更問誰日用堂堂無向背春山一任鷓鴣啼金山修磚岸長江萬里湧金鰲屹立中流氣勢豪直下放教根腳穩任教八面起風濤印藏經分明印板脫將來只為勞生眼未開破一微塵翻得出大千沙界起雲雷焙經兒孫一代錯商量抖擻瞿曇爛肚腸三昧火熏三毒火家私那許外人揚錢清接待短䇿輕囊稱野情憧憧何事過錢清入門喫飯出門去莫道沃洲山水青贈醫牙道人先生得道醫牙齒痛令不痛消彈指飽飯吾今八十年未嘗咬著一粒米匠點劃縱橫一脫新之乎者也轉精神只於黑白分明處驗盡尋行數墨人淨髮工夫用處沒蹻踦心手相應合自知毫髮盡時消息盡不妨眼上又安眉真讚出山相萬乘尊榮都棄了六年雪嶺受飢寒明星一見便回首到底依前被眼瞞觀音苦海橫身一葉輕黑風吹墮任縱橫要令險處人回首月在補陀天際生馬郎婦神清風韻高𩯭緑雲鬟小賺盡好郎君法華都誦了到頭姻婭不成雙金沙月影空相照達磨二竺國太平思泛海中華禍起向東來當時不遇梁天子只好深深掘地埋梁皇法令豈徒勞滯貨私通價轉高蘆葦蕭蕭熊耳月至今大地是波濤寶公剪刀拂尺高挂金錫賣狗懸羊多虗少實掉發武帝趕達磨過江五葉一花從此狼藉稽首十二面觀音正面有誰識得㘞布袋兜率內宮不肯住杖挑布袋紅塵去不知開口笑何人待你下生人笑你阿呵呵寬著肚皮等著他猪頭和尚金華聖者無人識相逢便討猪頭喫回首還從舊路歸春風一陳香狼藉蜆子不釣鯨鰲只撈蜆得些滋味興偏佳拈來塞斷娘生口一段風光屬當家寒山沒伎倆愛吟詩一句子少人知寥寥靜聽松風吹拾得生掃用得親休指注枉辛勤本來田地絶纖塵藥山瓶內水松下經有人來問覿面相呈白雲散盡秋天青懶瓚山窈窕路羊腸紫泥下詔御墨猶香報道我儂煨芋忙德山擔疏鈔行腳大負不平氣失腳到龍潭未愜平生意吹滅紙燈時拶著娘生鼻便將一炬火燒却間故紙從茲憤憤覔冤讎一條白棒掀天地臨濟黃蘗山頭兀坐開口咬著生䥫高安灘上翻身也似掉棒打月從茲便解赤手白拈以楔出楔別別無位真人乾屎橛佛光法師蕩蕩慈風彌宇宙滔滔辨瀉四河清毗盧海印全身佩香擁優曇滿帝城虗堂和尚戲海獰龍出山猛虎眼蓋乾坤氣吞佛祖嚴法令則滴水氷生提向上則超今越古九據名藍三奉詔旨無愧當年面壁人只是口門多一齒覺城夏大師隱峰有女弟我亦有女弟雖然各自行必竟同時至花開花落覺城東兒孫代代長相繼自讚𦘕得十分且信一半腳尾腳頭渾無畔岸一點鬼眼睛黑豆終難換徐行緩步五峰頭一輪明月凌宵漢穹窿森長老請渠儂面目𦘕則不似只因伎倆全無重負楊岐擔子棒喝機前阿誰敢擬橫拋豎擲破沙盆通玄峰頂清風起日本瓊林侍者請百醜千拙無法可說一箇拳頭硬如生鐵放開則日耀扶桑揑聚則乾坤黯黑冤家莫興惡相從正法眼藏瞎驢滅小師淳縝請工夫縝密描𦘕不及正令全提佛也不識十分惡毒得人憎付與破家五逆小師淳元請據坐胡床風生萬壑無說而說無作而作聲前的的有來源必竟不留元字腳小師淳密請頭白眉鬚白胸中無點墨說禪不入時㨾一味點胸點肋密意分明生汝邊何待當來問彌勒郁維那請這漢酷毒元無面目描𦘕難成下筆則觸瞎衲僧正眼滅老胡種族殃害叢林卒未休一時付與清江郁益侍者請面目可憎胸中條直勿彼勿此何損何益不將佛法當人情一任破沙盆狼藉寮前老郎請心直如絃性急似箭翻手覆手日面月面零敲碎打破沙盆我見人見衆生見壽者見小佛事照維那秉炬十聲捶斷萬機休罷寂照光明一時捩下淨裸裸赤灑灑到頭生死覔無蹤家家門前有火把曇堂主秉炬群陰剝盡一陽方至出死入生如同遊戲曇堂主休擬議破屋從教野火燒一朵曇華香撲鼻琛新戒秉炬早歲為僧早歲亡曇花結果未經霜秋風不是相催促布袋頭開拄杖忙有佛處不得住無佛處急走過生死牢關俱拶破且道拶破後如何我喚作火你不得喚作火秀上座秉炬傲雪凌霜松柏獨秀葉落歸根來時無口古德恁麼道生死何曾有盡情燒作一堆灰看取神光射牛斗一藏主秉炬福州人密菴三世孫打圓相云只這箇的的自破沙盆而出八十一年受用不盡一大藏教詮注不及揚下住山鈯斧笑傲清泉白石利鎖名韁不可拘鼻孔遼天人不識來無蹤去無跡石火光中歲月長任是鐵蛇鑽不入立上座入塔一塵不立銀山鐵壁生死牢關佛也不識硬骨頭底從這裏入拱大師入塔圓寂拱大師今時劉鐵磨只這硬骨頭嫌佛不肯做一去又回來必竟無兩箇曾經爐鞴裏翻身多子塔前重按過台淨人秉炬富貴不羡三台學道要齊盧老踏翻生死牢關說甚丹霞剗草恁麼也好不恁麼也好臘月火燒山雪擁千峰曉十老郎秉炬夢裏來來不記秋但知白却小年頭聞經聽法依僧住生死無拘得自由草鞋緊峭脫體風流不須撥火覔浮漚侍淨人秉炬侍吾左侍吾右合掌進前叉手退後碓坊米白翻身不墮黃梅窠臼不書偈不傳衣竪火把看取紅爐片雪飛辭世頌八十二年駕無底船踏翻歸去明月一天行狀師諱普度維楊江都人號虗舟姓史氏始丹陽有閩之吳頭陀者白頭黑面年八十餘旦夕兀坐如枯樁槌磬禮補陀像口常暗誦妙蓮華經嘗與師祖父荊吳間相識每持鉢過淮輒𢪔其家宿祖父遇之特厚一日早炊罷祖母坐堂上頭陀自外直趨將産之室祖母怪其故躡其蹤至産所無有也尋走家奴詣其居問居人曰曉鐘三杵時頭陀坐匡牀脫去矣已而誕師異香發諸舍徹諸其鄰類莟萏久之及晬隔江見金山浮屠便能合爪遇比丘客過門輒抱持其衣躍然喜稍長雖粗習詩禮世書絶無處俗意母夫人以其宿志不可奪命依郡之天寧出家時年十二矣踰二年會畢將軍再遇飯僧于院與語大奇之指謂主廗者曰此兒短小精悍音吐如鐘他日法中向上爪牙也携以歸中都時思蘭若圓頂日且大集禪講碩德為之證淨慈少林嵩為之落䰂靈隱䥫牛印為之付衣本郡東堂院龍溪祖信為之受業師納戒已歸東堂服勤信左右者五年一夕忽奮謂同列曰吾觀達磨神光以來龍馳虎驟鳳擊鵬搏皆博地凡夫直躋祖位彼能是我乃不能是耶黎明挈一笠趍䥫牛印印以法語壯其行江東西湖南北由是遍歷焉無得通禪師時唱松源之道于番昜薦福因決意扣請以厭初願其遷福嚴華藏皆挾袱與之俱偶入室次通問曰不與萬法為侶是甚麼人師曰金香爐下鐵崑崙通曰將謂者矮子有長處見解乃爾師曲躬作禮曰謝和尚證明自此磁鐵相契法務無難易歷試之居數年辭通以所得質當世天童晦巖光大慈石巖璉虎丘石室迪一見器異為不可及因留典法務于三師間淳祐初制府趙信菴以建康半山敦請出世舉香嗣無得潤之金山潭之鹿苑撫之疏山蘇之承天繇此階級而升師之居金山癡絶居玉山有傳其雪中示衆一夜江風攪玉麈孤峰不白轉精神之句癡絶大驚親拿舟訪之曰老夫當退三舍其勝德使人歸重如此己乃謝事居靈隱之西堂聲譽日益洋溢景定間太傅賈魏公以其名聞于上出補中天竺虗席六年會靈隱退耕寧公物故魏公復奏師繼所統居其寺七年來者川會雲委法席號為甚盛適有挾私忿致瘡痏於當軸者師即棄去不顧至元丁丑被命徑山山中大火滌地之餘竭心極力圖興復方將有成俄示微恙遽索筆大書曰八十二年駕無底船踏翻歸去明月一天怡然趺坐而化實庚辰四月二十有四日也越七日全身塔于寺東十里罣罳塢之陽壽如其偈坐夏六十八度弟子二百稟法訓徒者彌江浙烏乎師之標表一世真可法也哉唱道鮮雕蟲篆刻語居位蔑喔咿儒兒態規行矩步隆寒盛暑不移而雛道人或不堪其嚴峻至于歸真之日天下知不知咸嗚咽流涕曰叢林典刑自此陸沉矣其小師淳朋請余掇平昔為之狀將俟銘大手筆余嘗從師徑山知師出處甚詳故直書不讓謹狀至元二十年十月日天台沙門行端狀破沙盆零敲碎打正得其傳折腳鐺左挈右提的有分付運一虗舟盡載南北無家之客冷泉亭下呈橈五髻峰前下載合兩朝之日月垂百世之光明非福足慧足安得盛大之若是也哉徒弟淳真侍者遠持八會録請雪巖法弟祖欽編次書此以記歲月云至元甲申中秋節謹跋
